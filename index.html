<!doctype html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-chat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --border: #dde3ee;
      --text: #1f2937;
      --muted: #6b7280;
      --user: #dbeafe;
      --assistant: #ecfeef;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --error: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .chat-app {
      width: min(900px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgb(15 23 42 / 8%);
      overflow: hidden;
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(120deg, #eef2ff, #f8fafc);
    }

    h1 { margin: 0; font-size: 1.6rem; }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .messages {
      height: 360px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fcfdff;
    }

    .message {
      padding: 12px 14px;
      border-radius: 12px;
      max-width: min(75ch, 90%);
      line-height: 1.45;
      border: 1px solid transparent;
    }
    .message-content { white-space: pre-wrap; }

    .message .label {
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
      font-size: 0.86rem;
      color: #334155;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
      border-color: #bfdbfe;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--assistant);
      border-color: #bbf7d0;
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .message-editor {
      width: 100%;
      min-height: 84px;
      max-height: 180px;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font: inherit;
      line-height: 1.4;
      overflow-y: auto;
      background: #fff;
    }

    .message-editor:focus-within {
      outline: 2px solid #93c5fd;
      outline-offset: 1px;
      border-color: #93c5fd;
    }

    .message-editor .ProseMirror {
      min-height: 58px;
      outline: none;
      white-space: pre-wrap;
    }

    .message-editor .ProseMirror p {
      margin: 0.35em 0;
    }

    .message-editor .ProseMirror p:first-child {
      margin-top: 0;
    }

    .message-editor .ProseMirror p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      float: left;
      color: var(--muted);
      pointer-events: none;
      height: 0;
    }

    .math-node {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      border-radius: 6px;
      padding: 2px 6px;
      display: inline-flex;
      align-items: center;
      min-height: 1.9em;
      vertical-align: middle;
      cursor: pointer;
    }

    .math-node.math-block {
      display: block;
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      background: #f8fafc;
      border-color: #cbd5e1;
      overflow-x: auto;
    }

    .math-node.math-error {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #7f1d1d;
      background: #fef2f2;
      border-color: #fecaca;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .button-group {
      display: flex;
      gap: 8px;
    }

    .status {
      color: var(--muted);
      font-size: 0.9rem;
      min-height: 1.2rem;
    }

    .status.error { color: var(--error); }

    .attachment-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .attachment-label {
      font-size: 0.92rem;
      color: var(--muted);
    }

    .attachment-preview {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px;
      max-width: 220px;
      background: #fff;
    }

    .attachment-preview img {
      display: block;
      width: 100%;
      max-height: 140px;
      object-fit: contain;
      border-radius: 6px;
    }

    .ghost-button {
      background: transparent;
      color: #334155;
      border: 1px solid #cbd5e1;
      padding: 8px 12px;
    }

    .ghost-button:hover {
      background: #f1f5f9;
    }
    .math-button {
      background: #0f766e;
    }

    .math-button:hover {
      background: #0d5f59;
    }

    .math-editor-modal {
      position: fixed;
      inset: 0;
      background: rgb(15 23 42 / 35%);
      display: grid;
      place-items: center;
      z-index: 30;
      padding: 16px;
    }

    .math-editor-modal[hidden] { display: none; }

    .math-editor-panel {
      width: min(1120px, 100%);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: grid;
      gap: 12px;
      box-shadow: 0 10px 30px rgb(15 23 42 / 18%);
    }

    .math-editor-help {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .math-editor-layout {
      display: grid;
      grid-template-columns: minmax(220px, 1.1fr) minmax(260px, 1fr) minmax(260px, 1fr);
      gap: 12px;
      min-height: 400px;
    }

    .math-pane {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f8fafc;
      padding: 12px;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .math-pane h3 {
      margin: 0;
      font-size: 1rem;
      color: #334155;
    }

    .symbol-search {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      font: inherit;
    }

    .symbol-categories {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
      padding-right: 2px;
    }

    .symbol-group h4 {
      margin: 0 0 6px;
      font-size: 0.84rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .symbol-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .symbol-button {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      color: #0f172a;
      min-height: 38px;
      display: grid;
      place-items: center;
      padding: 4px;
      font-size: 1.05rem;
      cursor: pointer;
    }

    .symbol-button:hover {
      border-color: #93c5fd;
      background: #eff6ff;
    }

    .math-preview-area,
    .math-latex-area {
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      overflow: auto;
    }

    .math-preview-area {
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .math-preview-render {
      min-height: 72px;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      padding: 10px;
      background: #f8fafc;
      overflow-x: auto;
    }

    .math-preview-input,
    .math-latex-output {
      width: 100%;
      min-height: 130px;
      resize: vertical;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.95rem;
      line-height: 1.4;
      background: #fff;
      color: #0f172a;
    }

    .math-latex-output {
      min-height: 265px;
    }

    .math-preview-input:focus,
    .math-latex-output:focus,
    .symbol-search:focus {
      outline: 2px solid #93c5fd;
      outline-offset: 1px;
      border-color: #93c5fd;
    }

    .math-mode-toggle {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.92rem;
      color: #334155;
      align-items: center;
    }

    .math-mode-toggle label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .math-example {
      font-size: 0.85rem;
      color: var(--muted);
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 18px;
      font: inherit;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }

    button:hover { background: var(--accent-hover); }

    .clear-button {
      background: #64748b;
    }

    .clear-button:hover {
      background: #475569;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    @media (max-width: 640px) {
      body { padding: 10px; }
      .messages { height: 50vh; }
      .actions { flex-direction: column; align-items: stretch; }
      .button-group { flex-direction: column; width: 100%; }
      button { width: 100%; }
      .math-editor-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="chat-app" aria-label="AI-chat-sovellus">
    <header class="header">
      <h1>AI-vitkutin</h1>
      <p class="subtitle">Yksinkertainen chat: frontend + Vercel Function (/api/chat).</p>
    </header>

    <section id="messages" class="messages" aria-live="polite" aria-label="Viestialue"></section>

    <section class="composer" aria-label="Viestin kirjoitus">
      <label for="prompt-editor">Kirjoita viesti</label>
      <div id="prompt-editor" class="message-editor" title="Kirjoita tekstiä ja lisää sekaan inline- tai block-kaavoja."></div>
      <div class="attachment-row" aria-label="Kuvakaappauksen liittäminen">
        <label for="screenshot" class="attachment-label">Lisää kuvakaappaus (PNG/JPG/WebP) tai liitä Ctrl+V</label>
        <input id="screenshot" type="file" accept="image/png,image/jpeg,image/webp,image/gif" />
        <button id="clear-screenshot" class="ghost-button" type="button">Poista kuva</button>
      </div>
      <div id="attachment-preview" class="attachment-preview" hidden>
        <img id="attachment-image" alt="Valittu kuvakaappaus" />
      </div>
      <div class="actions">
        <div id="status" class="status" role="status" aria-live="polite"></div>
        <div class="button-group">
          <button id="add-formula" class="math-button" type="button">Lisää kaava</button>
          <button id="clear-history" class="clear-button" type="button">Tyhjennä keskustelu</button>
          <button id="send" type="button">Lähetä</button>
        </div>
      </div>
    </section>
  </main>

  <div id="math-editor-modal" class="math-editor-modal" hidden>
    <section class="math-editor-panel" role="dialog" aria-modal="true" aria-labelledby="math-editor-title">
      <h2 id="math-editor-title">Lisää matemaattinen kaava</h2>
      <p class="math-editor-help">Valitse merkkejä vasemmalta, muokkaa keskellä ja näe vastaava LaTeX oikealla.</p>
      <div class="math-mode-toggle">
        <strong>Näyttötapa:</strong>
        <label><input type="radio" name="math-mode" value="inline" checked /> Inline</label>
        <label><input type="radio" name="math-mode" value="display" /> Block</label>
      </div>
      <div class="math-editor-layout">
        <section class="math-pane" aria-label="Symbolipaneeli">
          <h3>Symbolit</h3>
          <input id="math-symbol-search" class="symbol-search" type="search" placeholder="Hae symboleita..." />
          <div id="math-symbol-categories" class="symbol-categories"></div>
        </section>
        <section class="math-pane" aria-label="Esikatselu">
          <h3>Esikatselu</h3>
          <div id="math-preview-render" class="math-preview-render" aria-live="polite"></div>
          <textarea id="math-editor-input" class="math-preview-input" spellcheck="false" aria-label="Kaavaeditori"></textarea>
        </section>
        <section class="math-pane" aria-label="LaTeX-koodi">
          <h3>LaTeX</h3>
          <textarea id="math-latex-output" class="math-latex-output" spellcheck="false" aria-label="LaTeX-koodi"></textarea>
        </section>
      </div>
      <div class="math-example">Esimerkit: <code>x^2+2x+1</code>, <code>\frac{-b\pm\sqrt{b^2-4ac}}{2a}</code></div>
      <div class="button-group">
        <button id="cancel-formula" type="button" class="ghost-button">Peruuta</button>
        <button id="insert-formula" type="button">Lisää tekstiin</button>
      </div>
    </section>
  </div>

  <script type="module">
    import { Editor, Node, mergeAttributes } from "https://esm.sh/@tiptap/core@2.11.5";
    import StarterKit from "https://esm.sh/@tiptap/starter-kit@2.11.5";
    import Placeholder from "https://esm.sh/@tiptap/extension-placeholder@2.11.5";

    const STORAGE_KEY = "ai-chat-history";
    const MAX_MESSAGES_FOR_BACKEND = 20;

    const messagesEl = document.getElementById("messages");
    const promptEditorEl = document.getElementById("prompt-editor");
    const sendButton = document.getElementById("send");
    const addFormulaButton = document.getElementById("add-formula");
    const clearHistoryButton = document.getElementById("clear-history");
    const screenshotInput = document.getElementById("screenshot");
    const clearScreenshotButton = document.getElementById("clear-screenshot");
    const attachmentPreviewEl = document.getElementById("attachment-preview");
    const attachmentImageEl = document.getElementById("attachment-image");
    const statusEl = document.getElementById("status");
    const mathEditorModalEl = document.getElementById("math-editor-modal");
    const mathSymbolSearchEl = document.getElementById("math-symbol-search");
    const mathSymbolCategoriesEl = document.getElementById("math-symbol-categories");
    const mathEditorInputEl = document.getElementById("math-editor-input");
    const mathLatexOutputEl = document.getElementById("math-latex-output");
    const mathPreviewRenderEl = document.getElementById("math-preview-render");
    const insertFormulaButton = document.getElementById("insert-formula");
    const cancelFormulaButton = document.getElementById("cancel-formula");
    const MAX_SCREENSHOT_BYTES = 5 * 1024 * 1024;

    const defaultInitialMessage = {
      role: "assistant",
      content: "Hei! Lähetä viesti, niin vastaan palvelinpuolen API-kutsun kautta.",
      includeInModelContext: false
    };

    let conversationHistory = [];
    let pendingScreenshotDataUrl = "";
    let pendingScreenshotName = "";
    let pendingMathEdit = null;
    let isSyncingMathEditor = false;

    const mathSymbolGroups = [
      {
        name: "Perus",
        symbols: [
          { label: "+", latex: "+" }, { label: "−", latex: "-" }, { label: "×", latex: "\\times " }, { label: "÷", latex: "\\div " },
          { label: "=", latex: "=" }, { label: "≠", latex: "\\neq " }, { label: "≈", latex: "\\approx " }, { label: "±", latex: "\\pm " }
        ]
      },
      {
        name: "Murtoluvut & potenssit",
        symbols: [
          { label: "a/b", latex: "\\frac{a}{b}" }, { label: "x²", latex: "x^2" }, { label: "xⁿ", latex: "x^n" }, { label: "√x", latex: "\\sqrt{x}" },
          { label: "ⁿ√x", latex: "\\sqrt[n]{x}" }, { label: "xᵢ", latex: "x_i" }, { label: "xⁱʲ", latex: "x_i^j" }, { label: "|x|", latex: "\\left|x\\right|" }
        ]
      },
      {
        name: "Operaattorit",
        symbols: [
          { label: "Σ", latex: "\\sum_{i=1}^{n}" }, { label: "Π", latex: "\\prod_{i=1}^{n}" }, { label: "∫", latex: "\\int_{a}^{b}" }, { label: "lim", latex: "\\lim_{x \\to \\infty}" },
          { label: "sin", latex: "\\sin\\left(x\\right)" }, { label: "cos", latex: "\\cos\\left(x\\right)" }, { label: "log", latex: "\\log\\left(x\\right)" }, { label: "ln", latex: "\\ln\\left(x\\right)" }
        ]
      },
      {
        name: "Kreikkalaiset",
        symbols: [
          { label: "α", latex: "\\alpha " }, { label: "β", latex: "\\beta " }, { label: "γ", latex: "\\gamma " }, { label: "Δ", latex: "\\Delta " },
          { label: "π", latex: "\\pi " }, { label: "θ", latex: "\\theta " }, { label: "λ", latex: "\\lambda " }, { label: "Ω", latex: "\\Omega " }
        ]
      }
    ];

    function renderKatexToElement(element, latex, displayMode) {
      if (typeof window.katex === "undefined") {
        element.textContent = `${displayMode ? "$$" : "$"}${latex}${displayMode ? "$$" : "$"}`;
        return;
      }
      try {
        // KaTeX renderöi turvallisesti vain LaTeX-tekstin.
        window.katex.render(latex, element, {
          displayMode,
          throwOnError: false
        });
      } catch {
        element.textContent = `${displayMode ? "$$" : "$"}${latex}${displayMode ? "$$" : "$"}`;
        element.classList.add("math-error");
      }
    }

    function getCurrentMathMode() {
      return document.querySelector('input[name="math-mode"]:checked')?.value || "inline";
    }

    function updateMathPreview(latex = "") {
      mathPreviewRenderEl.classList.remove("math-error");
      renderKatexToElement(mathPreviewRenderEl, latex, getCurrentMathMode() === "display");
    }

    function syncMathEditorFromInput(source) {
      if (isSyncingMathEditor) return;
      isSyncingMathEditor = true;
      if (source === "input") {
        mathLatexOutputEl.value = mathEditorInputEl.value;
      } else if (source === "latex") {
        mathEditorInputEl.value = mathLatexOutputEl.value;
      }
      updateMathPreview(mathEditorInputEl.value.trim());
      isSyncingMathEditor = false;
    }

    function insertLatexIntoEditor(snippet) {
      const textarea = mathEditorInputEl;
      const start = textarea.selectionStart ?? textarea.value.length;
      const end = textarea.selectionEnd ?? textarea.value.length;
      textarea.value = `${textarea.value.slice(0, start)}${snippet}${textarea.value.slice(end)}`;
      const nextCursor = start + snippet.length;
      textarea.focus();
      textarea.setSelectionRange(nextCursor, nextCursor);
      syncMathEditorFromInput("input");
    }

    function renderMathSymbolPalette() {
      const query = mathSymbolSearchEl.value.trim().toLowerCase();
      const groups = mathSymbolGroups
        .map((group) => ({
          ...group,
          symbols: group.symbols.filter((symbol) => {
            if (!query) return true;
            return symbol.label.toLowerCase().includes(query) || symbol.latex.toLowerCase().includes(query);
          })
        }))
        .filter((group) => group.symbols.length > 0);

      mathSymbolCategoriesEl.replaceChildren();
      for (const group of groups) {
        const section = document.createElement("section");
        section.className = "symbol-group";

        const heading = document.createElement("h4");
        heading.textContent = group.name;
        section.appendChild(heading);

        const grid = document.createElement("div");
        grid.className = "symbol-grid";

        for (const symbol of group.symbols) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "symbol-button";
          button.title = symbol.latex;
          button.innerHTML = symbol.label;
          button.addEventListener("click", () => insertLatexIntoEditor(symbol.latex));
          grid.appendChild(button);
        }

        section.appendChild(grid);
        mathSymbolCategoriesEl.appendChild(section);
      }
    }

    // Math-node editoriin: säilyttää alkuperäisen LaTeXin attrs.latex-arvossa.
    function createMathNode({ name, inline, group, cssClass, displayMode }) {
      return Node.create({
        name,
        group,
        inline,
        atom: true,
        selectable: true,
        draggable: false,
        addAttributes() {
          return {
            latex: {
              default: ""
            }
          };
        },
        parseHTML() {
          return [{ tag: `${inline ? "span" : "div"}[data-type="${name}"]` }];
        },
        renderHTML({ HTMLAttributes }) {
          return [inline ? "span" : "div", mergeAttributes(HTMLAttributes, {
            "data-type": name,
            "data-latex": HTMLAttributes.latex || ""
          })];
        },
        addNodeView() {
          return ({ node, getPos }) => {
            const dom = document.createElement(inline ? "span" : "div");
            dom.className = `math-node ${cssClass}`;
            dom.dataset.type = name;

            const updateMathNodeDom = (latexValue) => {
              dom.classList.remove("math-error");
              dom.dataset.latex = latexValue;
              renderKatexToElement(dom, latexValue, displayMode);
              dom.title = "Klikkaa muokataksesi kaavaa";
            };

            updateMathNodeDom(node.attrs.latex || "");

            dom.addEventListener("click", () => {
              const pos = typeof getPos === "function" ? getPos() : null;
              openMathEditor(displayMode ? "display" : "inline", node.attrs.latex || "", pos, name);
            });

            return {
              dom,
              update(updatedNode) {
                if (updatedNode.type.name !== name) return false;
                updateMathNodeDom(updatedNode.attrs.latex || "");
                return true;
              }
            };
          };
        }
      });
    }

    const InlineMath = createMathNode({
      name: "inlineMath",
      inline: true,
      group: "inline",
      cssClass: "math-inline",
      displayMode: false
    });

    const BlockMath = createMathNode({
      name: "blockMath",
      inline: false,
      group: "block",
      cssClass: "math-block",
      displayMode: true
    });

    const editor = new Editor({
      element: promptEditorEl,
      extensions: [
        StarterKit.configure({
          heading: false,
          bulletList: false,
          orderedList: false,
          codeBlock: false,
          blockquote: false,
          horizontalRule: false
        }),
        Placeholder.configure({
          placeholder: "Kirjoita viesti tähän… Lisää kaava painikkeella (inline tai block)."
        }),
        InlineMath,
        BlockMath
      ],
      content: "<p></p>"
    });

    function isValidHistoryItem(item) {
      return item &&
        (item.role === "user" || item.role === "assistant") &&
        typeof item.content === "string" &&
        item.content.trim().length > 0;
    }

    function renderHistory() {
      const nextChildren = conversationHistory.map(createMessageElement);
      messagesEl.replaceChildren(...nextChildren);

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function createMessageElement(message) {
      const article = document.createElement("article");
      article.className = `message ${message.role}`;

      const label = document.createElement("span");
      label.className = "label";
      label.textContent = message.role === "user" ? "Sinä" : "AI";

      const content = document.createElement("div");
      content.className = "message-content";
      renderMessageContent(content, message.content);

      article.appendChild(label);
      article.appendChild(content);
      return article;
    }

    function tokenizeLatex(text) {
      // Etsitään sekä $$display$$ että $inline$ -kaavat.
      const tokens = [];
      const mathPattern = /\$\$([\s\S]+?)\$\$|\$([^\n$]+?)\$/g;
      let lastIndex = 0;
      let match;

      while ((match = mathPattern.exec(text)) !== null) {
        const matchedText = match[0];
        const start = match.index;
        const end = start + matchedText.length;

        if (start > lastIndex) {
          tokens.push({ type: "text", value: text.slice(lastIndex, start) });
        }

        const latex = match[1] ?? match[2] ?? "";
        const displayMode = typeof match[1] === "string";
        tokens.push({ type: "math", value: latex, displayMode });
        lastIndex = end;
      }

      if (lastIndex < text.length) {
        tokens.push({ type: "text", value: text.slice(lastIndex) });
      }

      return tokens;
    }

    function renderMessageContent(container, rawText) {
      container.replaceChildren();
      const tokens = tokenizeLatex(rawText);

      for (const token of tokens) {
        if (token.type === "text") {
          container.appendChild(document.createTextNode(
            token.value
          ));
          continue;
        }

        const mathElement = document.createElement(token.displayMode ? "div" : "span");
        renderKatexToElement(mathElement, token.value, token.displayMode);
        container.appendChild(mathElement);
      }
    }

    // Serialisointi OpenAI:lle: teksti + inlineMath->$...$ + blockMath->$$...$$.
    function serializeEditorForBackend() {
      const node = editor.state.doc;
      const chunks = [];

      function walk(currentNode) {
        if (currentNode.type.name === "text") {
          chunks.push(currentNode.text || "");
          return;
        }
        if (currentNode.type.name === "hardBreak") {
          chunks.push("\n");
          return;
        }
        if (currentNode.type.name === "inlineMath") {
          chunks.push(`$${currentNode.attrs.latex || ""}$`);
          return;
        }
        if (currentNode.type.name === "blockMath") {
          chunks.push(`\n$$${currentNode.attrs.latex || ""}$$\n`);
          return;
        }

        currentNode.content?.forEach((childNode) => walk(childNode));
        if (currentNode.type.name === "paragraph") {
          chunks.push("\n");
        }
      }

      walk(node);
      return chunks.join("").replace(/\n{3,}/g, "\n\n").trim();
    }

    // Mahdollinen deserialisointi myöhempää editorin palautusta varten.
    function deserializeTextToEditorDoc(text) {
      const docContent = [];
      const blockRegex = /\$\$([\s\S]+?)\$\$/g;
      let last = 0;
      let blockMatch;

      function pushInlineParagraph(segment) {
        if (!segment) return;
        const inlineContent = [];
        const inlineRegex = /\$([^\n$]+?)\$/g;
        let inlineLast = 0;
        let inlineMatch;
        while ((inlineMatch = inlineRegex.exec(segment)) !== null) {
          if (inlineMatch.index > inlineLast) {
            inlineContent.push({ type: "text", text: segment.slice(inlineLast, inlineMatch.index) });
          }
          inlineContent.push({ type: "inlineMath", attrs: { latex: inlineMatch[1] } });
          inlineLast = inlineMatch.index + inlineMatch[0].length;
        }
        if (inlineLast < segment.length) {
          inlineContent.push({ type: "text", text: segment.slice(inlineLast) });
        }
        docContent.push({ type: "paragraph", content: inlineContent.length ? inlineContent : [{ type: "text", text: "" }] });
      }

      while ((blockMatch = blockRegex.exec(text)) !== null) {
        pushInlineParagraph(text.slice(last, blockMatch.index).trim());
        docContent.push({ type: "blockMath", attrs: { latex: blockMatch[1] || "" } });
        last = blockMatch.index + blockMatch[0].length;
      }
      pushInlineParagraph(text.slice(last).trim());

      if (docContent.length === 0) {
        docContent.push({ type: "paragraph" });
      }
      return { type: "doc", content: docContent };
    }

    function saveHistory() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(conversationHistory));
    }

    function loadHistory() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          conversationHistory = [defaultInitialMessage];
          return;
        }

        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) {
          conversationHistory = [defaultInitialMessage];
          return;
        }

        const validMessages = parsed.filter(isValidHistoryItem).map((item) => ({
          role: item.role,
          content: item.content,
          includeInModelContext: item.includeInModelContext !== false
        }));

        conversationHistory = validMessages.length > 0 ? validMessages : [defaultInitialMessage];
      } catch {
        conversationHistory = [defaultInitialMessage];
      }
    }

    function addMessageToHistory(role, content, options = {}) {
      const includeInModelContext = options.includeInModelContext !== false;
      conversationHistory.push({ role, content, includeInModelContext });
      saveHistory();
      renderHistory();
    }

    function buildMessagesForBackend() {
      const messagesForModel = conversationHistory
        .filter((message) => message.includeInModelContext !== false)
        .map((message) => ({ role: message.role, content: message.content }));

      return messagesForModel.slice(-MAX_MESSAGES_FOR_BACKEND);
    }

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle("error", isError);
    }

    function clearPendingScreenshot() {
      pendingScreenshotDataUrl = "";
      pendingScreenshotName = "";
      screenshotInput.value = "";
      attachmentImageEl.removeAttribute("src");
      attachmentPreviewEl.hidden = true;
    }

    function setPendingScreenshot(name, dataUrl) {
      pendingScreenshotName = name;
      pendingScreenshotDataUrl = dataUrl;
      attachmentImageEl.src = dataUrl;
      attachmentPreviewEl.hidden = false;
    }

    function handleScreenshotChange(event) {
      const file = event.target.files?.[0];
      if (!file) {
        clearPendingScreenshot();
        return;
      }

      processScreenshotFile(file);
    }

    function processScreenshotFile(file) {
      if (!file) {
        clearPendingScreenshot();
        return;
      }

      if (!file.type.startsWith("image/")) {
        clearPendingScreenshot();
        setStatus("Vain kuvatiedostot ovat sallittuja.", true);
        return;
      }

      if (file.size > MAX_SCREENSHOT_BYTES) {
        clearPendingScreenshot();
        setStatus("Kuvan maksimikoko on 5 Mt.", true);
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = typeof reader.result === "string" ? reader.result : "";
        if (!dataUrl.startsWith("data:image/")) {
          clearPendingScreenshot();
          setStatus("Kuvan lukeminen epäonnistui.", true);
          return;
        }

        setPendingScreenshot(file.name, dataUrl);
        setStatus(`Kuvakaappaus valmis: ${file.name}`);
      };
      reader.onerror = () => {
        clearPendingScreenshot();
        setStatus("Kuvan lukeminen epäonnistui.", true);
      };
      reader.readAsDataURL(file);
    }

    function handlePaste(event) {
      const clipboardItems = event.clipboardData?.items;
      if (!clipboardItems || clipboardItems.length === 0) return;

      const imageItem = Array.from(clipboardItems).find((item) => item.type.startsWith("image/"));
      if (!imageItem) return;

      const imageFile = imageItem.getAsFile();
      if (!imageFile) return;

      event.preventDefault();
      processScreenshotFile(imageFile);
    }

    async function sendMessage() {
      const message = serializeEditorForBackend();
      if (!message && !pendingScreenshotDataUrl) return;

      const hasScreenshot = Boolean(pendingScreenshotDataUrl);
      const userVisibleMessage = hasScreenshot
        ? (message ? `${message}\n\n📎 Kuvakaappaus liitetty: ${pendingScreenshotName}` : `📎 Kuvakaappaus liitetty: ${pendingScreenshotName}`)
        : message;

      addMessageToHistory("user", userVisibleMessage);
      editor.commands.clearContent(true);
      sendButton.disabled = true;
      clearHistoryButton.disabled = true;
      screenshotInput.disabled = true;
      clearScreenshotButton.disabled = true;
      setStatus("Ladataan...");

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages: buildMessagesForBackend(),
            latestUserImage: pendingScreenshotDataUrl || null
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Tuntematon virhe");
        }

        addMessageToHistory("assistant", data.reply || "(Tyhjä vastaus)");
        setStatus("");
        clearPendingScreenshot();
      } catch (error) {
        setStatus(`Virhe: ${error.message}`, true);
        addMessageToHistory("assistant", `⚠️ Virhe: ${error.message}`);
      } finally {
        sendButton.disabled = false;
        clearHistoryButton.disabled = false;
        screenshotInput.disabled = false;
        clearScreenshotButton.disabled = false;
        editor.commands.focus();
      }
    }

    function openMathEditor(mode = "inline", latex = "", pos = null, nodeType = null) {
      pendingMathEdit = pos !== null && Number.isFinite(pos) ? { pos, nodeType } : null;
      mathEditorModalEl.hidden = false;
      mathEditorInputEl.value = latex;
      mathLatexOutputEl.value = latex;
      const selectedMode = mode === "display" ? "display" : "inline";
      const radioToSelect = document.querySelector(`input[name="math-mode"][value="${selectedMode}"]`);
      if (radioToSelect) radioToSelect.checked = true;
      renderMathSymbolPalette();
      updateMathPreview(latex);
      setStatus("Lisää kaava ja paina \"Lisää tekstiin\".");
      setTimeout(() => mathEditorInputEl.focus(), 0);
    }

    function closeMathEditor() {
      mathEditorModalEl.hidden = true;
      pendingMathEdit = null;
      editor.commands.focus();
    }

    function insertFormulaToPrompt() {
      const latex = mathEditorInputEl.value.trim();
      if (!latex) {
        setStatus("Kirjoita ensin kaava editoriin.", true);
        return;
      }

      const mode = document.querySelector('input[name="math-mode"]:checked')?.value || "inline";
      const nodeName = mode === "display" ? "blockMath" : "inlineMath";
      const nodeAttrs = { latex };

      if (pendingMathEdit) {
        try {
          editor.commands.command(({ tr, state, dispatch }) => {
            const targetNode = state.doc.nodeAt(pendingMathEdit.pos);
            if (!targetNode) return false;
            const safeNodeName = targetNode.type.name === "inlineMath" || targetNode.type.name === "blockMath"
              ? targetNode.type.name
              : nodeName;
            const targetType = state.schema.nodes[safeNodeName];
            if (!targetType) return false;
            tr.setNodeMarkup(pendingMathEdit.pos, targetType, nodeAttrs);
            if (dispatch) dispatch(tr);
            return true;
          });
        } catch {
          // Fallback: jos muokkaus epäonnistuu, lisätään uusi kaava nykyiseen kursoriin.
          editor.chain().focus().insertContent(mode === "display"
            ? [{ type: "blockMath", attrs: nodeAttrs }, { type: "paragraph" }]
            : { type: "inlineMath", attrs: nodeAttrs }).run();
        }
      } else {
        const insertionPayload = mode === "display"
          ? [{ type: "blockMath", attrs: nodeAttrs }, { type: "paragraph" }]
          : { type: "inlineMath", attrs: nodeAttrs };
        editor.chain().focus().insertContent(insertionPayload).run();
      }

      closeMathEditor();
      setStatus("Kaava lisätty viestiin.");
    }

    function clearHistory() {
      const confirmed = window.confirm("Oletko varma, että haluat tyhjentää keskustelun?");
      if (!confirmed) return;

      conversationHistory = [defaultInitialMessage];
      localStorage.removeItem(STORAGE_KEY);
      messagesEl.replaceChildren(createMessageElement(defaultInitialMessage));
      messagesEl.scrollTop = messagesEl.scrollHeight;
      setStatus("Keskustelu tyhjennetty.");
      editor.commands.focus();
    }

    function setupKnownNonAppWarningFilter() {
      window.addEventListener("unhandledrejection", (event) => {
        const reasonText = String(event.reason?.message || event.reason || "");
        const isKnownExtensionWarning = reasonText.includes(
          "A listener indicated an asynchronous response by returning true, but the message channel closed before a response was received"
        );

        if (isKnownExtensionWarning) {
          event.preventDefault();
          console.info(
            "[AI-chat] Sivu ohitti selaimen lisäosan aiheuttaman unhandledrejection-varoituksen."
          );
        }
      });
    }

    setupKnownNonAppWarningFilter();
    sendButton.addEventListener("click", sendMessage);
    addFormulaButton.addEventListener("click", openMathEditor);
    insertFormulaButton.addEventListener("click", insertFormulaToPrompt);
    cancelFormulaButton.addEventListener("click", closeMathEditor);
    mathEditorInputEl.addEventListener("input", () => syncMathEditorFromInput("input"));
    mathLatexOutputEl.addEventListener("input", () => syncMathEditorFromInput("latex"));
    mathSymbolSearchEl.addEventListener("input", renderMathSymbolPalette);
    document.querySelectorAll('input[name="math-mode"]').forEach((radio) => {
      radio.addEventListener("change", () => updateMathPreview(mathEditorInputEl.value.trim()));
    });
    mathEditorModalEl.addEventListener("click", (event) => {
      if (event.target === mathEditorModalEl) closeMathEditor();
    });
    clearHistoryButton.addEventListener("click", clearHistory);
    screenshotInput.addEventListener("change", handleScreenshotChange);
    clearScreenshotButton.addEventListener("click", () => {
      clearPendingScreenshot();
      setStatus("Kuvakaappaus poistettu.");
    });
    document.addEventListener("paste", handlePaste);

    promptEditorEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
        event.preventDefault();
        sendMessage();
      }
    });

    loadHistory();
    saveHistory();
    renderHistory();
    renderMathSymbolPalette();
    editor.commands.focus();
  </script>
</body>
</html>
